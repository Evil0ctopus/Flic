[platformio]
src_dir = firmware

[env:m5cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
build_src_filter =
    +<*>
    -<engine/speech_recognition*>
monitor_speed = 115200
monitor_filters =
    time
    colorize
upload_speed = 115200
lib_deps =
    m5stack/M5Unified
    bblanchon/ArduinoJson @ ^7.4.2
    links2004/WebSockets @ ^2.4.1
    adafruit/Adafruit NeoPixel @ ^1.12.3
    earlephilhower/ESP8266SAM
build_flags =
    -Iinclude
    -DCORE_DEBUG_LEVEL=3
    -DFLIC_LOG_LEVEL=3
